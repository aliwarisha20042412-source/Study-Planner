<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Credit Calculator</title>
  <style>
    body {
      font-family: Georgia, serif;
      background: #f5f3ee;
      color: #2c2c2c;
      padding: 40px;
    }

    h3 {
      font-size: 1.4rem;
      margin-bottom: 12px;
    }

    input[type="text"] {
      padding: 6px 10px;
      font-size: 1rem;
      border: 1px solid #aaa;
      border-radius: 4px;
    }

    button {
      padding: 7px 16px;
      font-size: 1rem;
      background: #2c2c2c;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      margin-left: 8px;
    }

    button:hover {
      background: #555;
    }

    #output {
      margin: 12px 0 28px;
      font-style: italic;
      color: #555;
    }

    h4 {
      margin: 28px 0 8px;
      font-size: 1.1rem;
    }

    table {
      border-collapse: collapse;
      margin-bottom: 32px;
    }

    th, td {
      border: 1px solid #aaa;
      padding: 8px 12px;
      text-align: left;
    }

    th {
      background: #e8e4dc;
    }

    #hours_ {
      font-weight: bold;
      color: #2c6e49;
    }

    table:first-of-type { width: 80%; }
    table:last-of-type  { width: 70%; }
  </style>
</head>
<body>
  <h3>Credit Calculator</h3>
  <input id="credits" type="text" placeholder="Enter credits">
  <button onclick="go()">Calculate</button>
  <p id="output"></p>

  <h4>Table 1</h4>
  <table>
    <tr>
      <th colspan="2">Module</th>
      <th>Time Left</th>
      <th>Predicted Grades</th>
    </tr>
    <tr>
      <th>Done</th>
      <th>Undone</th>
      <th></th>
      <th></th>
    </tr>
    <tr>
      <td><input type="text" placeholder="Module 1"></td>
      <td><input type="text" placeholder="Module 1"></td>
      <td id="hours_">—</td>
      <td></td>
    </tr>
    <tr>
      <td><input type="text" placeholder="Module 2"></td>
      <td><input type="text" placeholder="Module 2"></td>
      <td><input type="time"></td>
      <td></td>
    </tr>
    <tr>
      <td><input type="text" placeholder="Module 3"></td>
      <td><input type="text" placeholder="Module 3"></td>
      <td><input type="time"></td>
      <td></td>
    </tr>
    <tr>
      <td><input type="text" placeholder="Module 4"></td>
      <td><input type="text" placeholder="Module 4"></td>
      <td><input type="time"></td>
      <td></td>
    </tr>
    <tr>
      <td><input type="text" placeholder="Module 5"></td>
      <td><input type="text" placeholder="Module 5"></td>
      <td><input type="time"></td>
      <td></td>
    </tr>
    <tr>
      <td><input type="text" placeholder="Module 6"></td>
      <td><input type="text" placeholder="Module 6"></td>
      <td><input type="time"></td>
      <td></td>
    </tr>
  </table>

  <h4>Table 2</h4>
  <table>
    <tr>
      <th>Module</th>
      <th>Credit</th>
      <th>Time Taken</th>
    </tr>
    <tr>
      <td><input type="text" placeholder="Module 1"></td>
      <td></td>
      <td></td>
    </tr>
    <tr>
      <td><input type="text" placeholder="Module 2"></td>
      <td></td>
      <td></td>
    </tr>
    <tr>
      <td><input type="text" placeholder="Module 3"></td>
      <td></td>
      <td></td>
    </tr>
    <tr>
      <td><input type="text" placeholder="Module 4"></td>
      <td></td>
      <td></td>
    </tr>
    <tr>
      <td><input type="text" placeholder="Module 5"></td>
      <td></td>
      <td></td>
    </tr>
    <tr>
      <td><input type="text" placeholder="Module 6"></td>
      <td></td>
      <td></td>
    </tr>
  </table>

  <script>
    function go() {
      var c = document.getElementById("credits").value;
      var hours = c * 10;
      document.getElementById("output").innerText = hours + " hours of study needed";
      document.getElementById("hours_").innerText = hours + "h";
    }
  </script>

</body>
</html>
